name: Sanitizers

permissions:
  contents: read

on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - main

jobs:
  sanitizers:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config: [asan_ubsan_lsan, tsan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.config }}
          repository-cache: true
          cache-save: ${{ github.event_name == 'push' }}

      - name: Configure kernel for TSan (ASLR breaks TSan shadow memory layout)
        if: matrix.config == 'tsan'
        run: sudo sysctl -w kernel.randomize_va_space=0

      - name: Run tests with sanitizers
        run: |
          bazel test --lockfile_mode=error --config=${{ matrix.config }} --config=x86_64-linux //src/... //tests/... --verbose_failures

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-${{ matrix.config }}-${{ github.run_id }}
          path: bazel-testlogs/
          retention-days: 7
